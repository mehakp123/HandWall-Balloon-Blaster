name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out project
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Download official MediaPipe hand model
        shell: bash
        run: |
          mkdir -p app/src/main/assets
          curl --fail --location --retry 3 \
            "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/latest/hand_landmarker.task" \
            --output app/src/main/assets/hand_landmarker.task
          test "$(stat -c%s app/src/main/assets/hand_landmarker.task)" -gt 1000000

      - name: Run unit tests five times
        shell: bash
        run: |
          for pass in 1 2 3 4 5; do
            echo "========== TEST PASS $pass OF 5 =========="
            gradle --no-daemon testDebugUnitTest
          done

      - name: Build debug APK
        run: gradle --no-daemon assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HandWall-Balloon-Blaster-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
